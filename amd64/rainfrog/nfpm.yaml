name: "rainfrog"
arch: "amd64"
platform: "linux"
version: "v0.3.17"
release: "1"
version_schema: semver
description: Terminal database management tool for Postgres databases.
maintainer: Ruohang Feng <rh@vonng.com>
vendor: "achristmascarl"
homepage: "https://github.com/achristmascarl/rainfrog"
license: "MIT"

rpm:
  prefixes:
    - /usr/bin

contents:
  - src: rainfrog/rainfrog
    dst: /usr/bin/rainfrog
    file_info:
      mode: 0755
