name: "gost"
arch: "amd64"
platform: "linux"
version: "v2.12.0"
release: "1"
version_schema: semver
description: GO Simple Tunnel
maintainer: Ruohang Feng <rh@vonng.com>
vendor: "ginuerzh"
homepage: "https://github.com/ginuerzh/gost"
license: "MIT"

rpm:
  prefixes:
    - /usr/bin

contents:
  - src: gost/gost
    dst: /usr/bin/gost
    file_info:
      mode: 0755

  - src: gost/LICENSE
    dst: /usr/share/doc/gost/LICENSE
    file_info:
      mode: 0644
