name: "xray"
arch: "arm64"
platform: "linux"
version: "26.3.27"
release: "1"
version_schema: semver
description: Xray-core is a powerful platform for anti-censorship.
maintainer: XTLS
vendor: "XTLS"
homepage: "https://github.com/XTLS/Xray-core"
license: "MPL-2.0"

contents:
  # binary
  - src: xray/xray
    dst: /usr/local/bin/xray
    file_info:
      mode: 0755

  # config
  - src: src/config.json
    dst: /etc/xray.json
    type: config|noreplace
    file_info:
      mode: 0644

  # service
  - src: src/xray.service
    dst: /usr/lib/systemd/system/xray.service
    type: config|noreplace
    file_info:
      mode: 0644

  # geo data
  - src: xray/geoip.dat
    dst: /usr/local/share/xray/geoip.dat
    file_info:
      mode: 0644

  - src: xray/geosite.dat
    dst: /usr/local/share/xray/geosite.dat
    file_info:
      mode: 0644

  # log dir
  - dst: /var/log/xray
    type: dir
    file_info:
      mode: 0755

  - dst: /var/log/xray/access.log
    type: ghost
    file_info:
      mode: 0644

  - dst: /var/log/xray/error.log
    type: ghost
    file_info:
      mode: 0644
