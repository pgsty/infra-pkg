name: "stalwart"
arch: "arm64"
platform: "linux"
version: "v0.16.0"
release: "1"
version_schema: semver
description: Stalwart Mail Server static musl binaries
maintainer: Ruohang Feng <rh@vonng.com>
vendor: "Stalwart Labs"
homepage: "https://github.com/stalwartlabs/stalwart"
license: "AGPL-3.0-or-later"

contents:
  - src: stalwart/stalwart
    dst: /usr/bin/stalwart
    file_info:
      mode: 0755

  - dst: /etc/stalwart/
    type: dir
    file_info:
      mode: 0755

  - dst: /var/lib/stalwart/
    type: dir
    file_info:
      mode: 0755
